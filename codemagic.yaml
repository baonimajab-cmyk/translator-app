workflows:
  ios-release:
    name: iOS Release Build

    max_build_duration: 60

    integrations:
      app_store_connect: Abiya tech dev team
      
    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.abiya.translator

      vars:
        BUNDLE_ID: com.abiya.translator

    scripts:
      - name: Clean
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Set iOS bundle identifier
        script: |
          xcode-project use-profiles

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers